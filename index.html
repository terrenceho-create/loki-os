<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loki Creatives OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0E14;color:#e2e8f0;font-family:"DM Sans",sans-serif;min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#2d2d3a;border-radius:2px}
    input:focus{outline:none}
    button{font-family:inherit;cursor:pointer}
    .bar-wrap{display:flex;align-items:flex-end;gap:3px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
    .bar-col:hover .bar-fill{filter:brightness(1.2)}
    .bar-fill{width:100%;border-radius:3px 3px 0 0;transition:filter 0.15s}
    .bar-label{font-size:0.57rem;color:#6b7280;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
    .tooltip{position:relative}
    .tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;font-size:0.7rem;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:10;font-family:monospace}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;

/* ── COLOURS ─────────────────────────────── */
const DARK={bg:"#0B0E14",surface:"rgba(255,255,255,0.03)",border:"rgba(255,255,255,0.07)",accent:"#E8A838",teal:"#7EB8A4",violet:"#A78BFA",green:"#4ade80",red:"#f87171",amber:"#fb923c",text:"#e2e8f0",muted:"#6b7280",dim:"#374151"};
const LIGHT={bg:"#F6F4EF",surface:"rgba(0,0,0,0.04)",border:"rgba(0,0,0,0.09)",accent:"#B07D0A",teal:"#2E7A6A",violet:"#6244A8",green:"#16a34a",red:"#dc2626",amber:"#c2720a",text:"#1a1a2e",muted:"#6b7280",dim:"#9ca3af"};
const C={...DARK};
const applyTheme=t=>{Object.assign(C,t==='light'?LIGHT:DARK);document.body.style.background=C.bg;};
const CC={GetGo:"#E8A838",LJ:"#A78BFA",SBDW:"#7EB8A4",TL:"#60a5fa",LG:"#f472b6",default:"#9ca3af"};
const SC={
  "Lead":"#6b7280","Quoted":"#9A7D0A","Confirmed":"#1A5276","Deposit Received":"#196F3D",
  "Footage In":"#6C3483","Editing":"#E8A838","First Cut Sent":"#7D6608","Revisions":"#A04000",
  "Final Review":"#1A5276","Ready to Deliver":"#7EB8A4","Delivered":"#4ade80","Closed":"#374151"
};

/* ── HELPERS ─────────────────────────────── */
const hkd=n=>{if(n===""||n==null)return"—";const a=Math.abs(n),s=a>=10000?`HK$${(a/1000).toFixed(1)}k`:`HK$${Math.round(a).toLocaleString()}`;return n<0?`-${s}`:s};
const pct=n=>n?`${Math.round(n*100)}%`:"0%";
const parseD=d=>{
  if(!d)return null;
  if(d instanceof Date)return d;
  const[y,m,day]=String(d).split('-').map(Number);
  return new Date(y,m-1,day); // 本地時間，避免 UTC 偏差
};
const daysUntil=d=>{if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((parseD(d)-t)/86400000)};

/* ── CSS BAR CHART ───────────────────────── */
function BarChart({data,segments,labelKey="week_start",refLine,height=150}){
  const stacked=data.map(d=>({...d,_t:segments.reduce((s,g)=>s+(+(d[g.key]||0)),0)}));
  const max=Math.max(...stacked.map(d=>d._t),refLine||0,1)*1.1;
  return(
    <div style={{width:"100%"}}>
      <div style={{display:"flex",gap:2,height,position:"relative",alignItems:"flex-end"}}>
        {refLine>0&&(
          <div style={{position:"absolute",left:0,right:0,bottom:`${(refLine/max)*height}px`,borderTop:`1px dashed ${segments[0].color}`,opacity:0.5,zIndex:4,pointerEvents:"none"}}/>
        )}
        {stacked.map((d,i)=>{
          let bot=0;
          const segs=segments.map(seg=>{
            const v=+(d[seg.key]||0),h=(v/max)*height,b=bot;
            bot+=h;return{...seg,h,b};
          });
          return(
            <div key={i} style={{flex:1,position:"relative",height:"100%",minWidth:0}}>
              {segs.map((s,si)=>s.h>0&&(
                <div key={si} style={{position:"absolute",bottom:`${s.b}px`,left:0,right:0,height:`${s.h}px`,background:s.color,borderRadius:si===segs.length-1?"3px 3px 0 0":"0"}}/>
              ))}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:2,marginTop:5}}>
        {data.map((d,i)=>(
          <div key={i} style={{flex:1,textAlign:"center",fontSize:"0.57rem",color:C.muted,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {d[labelKey]?String(d[labelKey]).slice(5):""}
          </div>
        ))}
      </div>
    </div>
  );
}
/* ── BASE COMPONENTS ─────────────────────── */
const Card=({children,style})=>(
  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",...style}}>{children}</div>
);
const Lbl=({children})=>(
  <div style={{fontSize:"0.62rem",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted,marginBottom:6}}>{children}</div>
);
const KPI=({label,value,sub,accent,icon})=>(
  <Card style={{flex:1,minWidth:140}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <Lbl>{label}</Lbl>
      <span style={{fontSize:"1rem",opacity:0.6}}>{icon}</span>
    </div>
    <div style={{fontSize:"clamp(1.1rem, 4.5vw, 1.85rem)",fontFamily:"'Fraunces',serif",fontWeight:600,color:accent||C.accent,lineHeight:1.1,marginBottom:4}}>{value}</div>
    {sub&&<div style={{fontSize:"0.67rem",color:C.muted}}>{sub}</div>}
  </Card>
);
const Badge=({status})=>{
  const c=SC[status]||C.muted;
  return<span style={{fontSize:"0.6rem",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.05em",color:c,background:`${c}20`,border:`1px solid ${c}40`,padding:"2px 7px",borderRadius:4}}>{status}</span>;
};

/* ── WEEK PACE CARD ──────────────────────── */
function WeekPaceCard({actual}){
  const TK='loki_weekly_target';
  const[target,setTarget]=useState(()=>parseFloat(localStorage.getItem(TK)||'25'));
  const[editing,setEditing]=useState(false);
  const[tmp,setTmp]=useState('');

  const today=new Date();
  const dow=today.getDay();
  const dayNum=dow===0?7:dow; // Mon=1 ... Sun=7
  const dayNames=['','一','二','三','四','五','六','日'];
  const expected=parseFloat((target/7*dayNum).toFixed(2));
  const act=parseFloat(actual||0);
  const diff=parseFloat((act-expected).toFixed(2));
  const remaining=Math.max(target-act,0);
  const daysLeft=7-dayNum;
  const dailyNeeded=daysLeft>0?remaining/daysLeft:0;

  const save=()=>{
    const v=parseFloat(tmp);
    if(!isNaN(v)&&v>0){localStorage.setItem(TK,v);setTarget(v);}
    setEditing(false);
  };

  return(
    <Card>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <Lbl>本週 Pace</Lbl>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:"0.62rem",color:C.muted,fontFamily:"monospace"}}>
            星期{dayNames[dayNum]}（Day {dayNum}/7）
          </span>
          {editing?(
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              <input value={tmp} onChange={e=>setTmp(e.target.value)} autoFocus
                onKeyDown={e=>e.key==='Enter'&&save()}
                style={{width:48,background:"rgba(255,255,255,0.08)",border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 6px",color:C.text,fontSize:"0.7rem",fontFamily:"monospace",textAlign:"center"}}/>
              <button onClick={save} style={{fontSize:"0.7rem",color:C.accent,background:"none",border:"none"}}>✓</button>
              <button onClick={()=>setEditing(false)} style={{fontSize:"0.7rem",color:C.dim,background:"none",border:"none"}}>✕</button>
            </div>
          ):(
            <button onClick={()=>{setTmp(String(target));setEditing(true);}}
              style={{fontSize:"0.6rem",color:C.muted,background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 8px",fontFamily:"monospace"}}>
              目標 {target}h ✎
            </button>
          )}
        </div>
      </div>

      {/* Numbers */}
      <div style={{display:"flex",gap:12,alignItems:"baseline",marginBottom:16}}>
        <div>
          <div style={{fontSize:"0.58rem",color:C.muted,fontFamily:"monospace",marginBottom:2}}>今週實際</div>
          <div style={{fontSize:"1.9rem",fontFamily:"'Fraunces',serif",color:C.accent,lineHeight:1}}>{act.toFixed(1)}h</div>
        </div>
        <div style={{fontSize:"1rem",color:C.dim,alignSelf:"center",margin:"0 2px"}}>/</div>
        <div>
          <div style={{fontSize:"0.58rem",color:C.muted,fontFamily:"monospace",marginBottom:2}}>今日應達</div>
          <div style={{fontSize:"1.9rem",fontFamily:"'Fraunces',serif",color:C.muted,lineHeight:1}}>{expected.toFixed(1)}h</div>
        </div>
        <div style={{marginLeft:"auto",textAlign:"right",alignSelf:"center"}}>
          <div style={{fontSize:"1.1rem",fontFamily:"'Fraunces',serif",fontWeight:600,color:diff>=0?C.green:C.red}}>
            {diff>=0?`+${diff.toFixed(1)}`:diff.toFixed(1)}h
          </div>
          <div style={{fontSize:"0.62rem",color:diff>=0?C.green:C.red}}>{diff>=0?'領先':'落後'}</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{position:"relative",marginBottom:24}}>
        <div style={{height:8,background:"rgba(255,255,255,0.07)",borderRadius:4,position:"relative",overflow:"visible"}}>
          {/* Actual fill */}
          <div style={{position:"absolute",left:0,top:0,bottom:0,
            width:`${Math.min(act/target,1)*100}%`,
            background:diff>=0?C.green:C.red,borderRadius:4}}/>
          {/* Expected marker */}
          <div style={{position:"absolute",top:-5,bottom:-5,
            left:`${Math.min(expected/target,1)*100}%`,
            width:2,background:C.accent,borderRadius:1,
            transform:"translateX(-50%)",zIndex:2}}/>
        </div>
        {/* Expected label */}
        <div style={{position:"absolute",top:12,
          left:`${Math.min(expected/target,1)*100}%`,
          transform:"translateX(-50%)",
          fontSize:"0.55rem",color:C.accent,fontFamily:"monospace",whiteSpace:"nowrap"}}>
          {expected.toFixed(1)}h ↑
        </div>
        {/* Target label */}
        <div style={{position:"absolute",top:12,right:0,
          fontSize:"0.55rem",color:C.dim,fontFamily:"monospace"}}>
          {target}h
        </div>
      </div>

      {/* Bottom */}
      <div style={{paddingTop:12,borderTop:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        {daysLeft>0?(
          <>
            <span style={{fontSize:"0.7rem",color:C.muted}}>
              剩 <strong style={{color:C.text}}>{daysLeft}</strong> 日
            </span>
            <span style={{fontSize:"0.7rem",color:C.muted}}>
              尚需 <strong style={{color:remaining>0?C.amber:C.green}}>{remaining.toFixed(1)}h</strong>
            </span>
            <span style={{fontSize:"0.7rem",color:C.muted}}>
              每日需 <strong style={{
                color:dailyNeeded>6?C.red:dailyNeeded>3?C.amber:C.green
              }}>{dailyNeeded.toFixed(1)}h</strong>
            </span>
          </>
        ):(
          <span style={{fontSize:"0.75rem",fontFamily:"monospace",
            color:remaining===0?C.green:C.red}}>
            {remaining===0?'✅ 本週目標完成！':`本週結束，差 ${remaining.toFixed(1)}h`}
          </span>
        )}
      </div>
    </Card>
  );
}

  
/* ── SETUP SCREEN ────────────────────────── */
function SetupScreen({onSave}){
  const[url,setUrl]=useState("");
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:32}}>
      <div style={{maxWidth:460,width:"100%"}}>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:"0.58rem",fontFamily:"monospace",color:C.muted,letterSpacing:"0.2em",marginBottom:8}}>FREELANCE OS</div>
          <div style={{fontSize:"1.8rem",fontFamily:"'Fraunces',serif",fontStyle:"italic",color:C.text}}>
            Connect your <span style={{color:C.accent}}>Sheet</span>
          </div>
        </div>
        <Card>
          <div style={{fontSize:"0.78rem",color:C.muted,lineHeight:1.8,marginBottom:20}}>
            <p style={{marginBottom:10,color:C.text,fontWeight:500}}>部署步驟：</p>
            <ol style={{paddingLeft:18,display:"flex",flexDirection:"column",gap:5}}>
              <li>Google Sheet → Extensions → Apps Script</li>
              <li>加入 <code style={{color:C.accent,background:"rgba(232,168,56,0.1)",padding:"1px 5px",borderRadius:3}}>SHEET_API.gs</code></li>
              <li>右上角「部署」→「新增部署作業」</li>
              <li>類型：網頁應用程式 ／ 存取：所有人</li>
              <li>複製 Web app URL 貼入下方</li>
            </ol>
          </div>
          <input value={url} onChange={e=>setUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/..."
            style={{width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.text,fontSize:"0.78rem",fontFamily:"monospace",marginBottom:12}}/>
          <button onClick={()=>url.trim()&&onSave(url.trim())}
            style={{width:"100%",background:C.accent,color:"#0B0E14",border:"none",borderRadius:8,padding:"10px 0",fontWeight:700,fontSize:"0.85rem"}}>
            連接 Sheet →
          </button>
        </Card>
      </div>
    </div>
  );
}

/* ── DASHBOARD VIEW ──────────────────────── */
function DashboardView({data}){
  const{dashboard:d={},jobs=[],capacity={}}=data;
  const recentWeeks=(capacity.weekly||[]).slice(-4).filter(w=>+w.total_hours>0);
  const avgDailyHrs=recentWeeks.length>0
    ?recentWeeks.reduce((s,w)=>s+(+w.total_hours),0)/recentWeeks.length/6
    :5;
  const backlogDays=Math.ceil((+d.backlog_hrs||0)/Math.max(avgDailyHrs,1));
  const weekly=(capacity.weekly||[]).slice(0,10).reverse();
  const ACTIVE=["Deposit Received","Footage In","Editing","First Cut Sent","Revisions"];
  const upcoming=jobs.filter(j=>ACTIVE.includes(j.status)&&j.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,5);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <KPI label="本月收入" value={hkd(d.monthly_income)} sub="已到帳" accent={C.accent} icon="💰"/>
        <KPI label="淨現金流" value={hkd(d.net_cashflow)} accent={d.net_cashflow>=0?C.green:C.red} sub={d.net_cashflow>=0?"正現金流":"留意支出"} icon="📊"/>
        <KPI label="今年總收入" value={hkd(d.ytd_income)} sub="2026 YTD" accent={C.teal} icon="📅"/>
        <KPI label="進行中" value={d.active_jobs||0} sub={`本月交付 ${d.delivered_month||0} 個`} accent={C.violet} icon="📁"/>
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <KPI label="本週 Billable" value={`${(+d.billable_hrs_week||0).toFixed(1)}h`} sub={`總工時 ${(+d.total_hrs_week||0).toFixed(1)}h`} accent={C.accent} icon="⏱"/>
        <KPI label="本週 Utilization" value={pct(d.utilization_week)} accent={d.utilization_week>=0.8?C.green:d.utilization_week>=0.5?C.amber:C.red} icon="⚡"/>
        <KPI label="本月 Billable" value={`${(+d.billable_hrs_month||0).toFixed(1)}h`} sub="月累計" accent={C.teal} icon="📋"/>
        <KPI label="積壓工時" value={`${(+d.backlog_hrs||0).toFixed(1)}h`} sub={`≈ ${backlogDays} 日（${avgDailyHrs.toFixed(1)}h/日均值）`} accent={(+d.backlog_hrs||0)>40?C.red:C.muted} icon="⏳"/>
        <WeekPaceCard actual={d.billable_hrs_week}/>
      </div>
      {weekly.length>0&&(
        <Card>
          <Lbl>過去 10 週 Billable 工時</Lbl>
          <div style={{marginTop:8}}>
            <BarChart
                  data={weekly.map(w=>({...w,_onb:Math.max((+(w.non_billable||0))-(+(w.marketing_hours||0)),0)}))}
                  segments={[{key:"billable_hours",color:C.accent},{key:"_onb",color:C.teal+"99"},{key:"marketing_hours",color:C.violet+"99"}]}
                  labelKey="week_start" refLine={16} height={130}
                />
              </div>
              <div style={{display:"flex",gap:12,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                {[[C.accent,"Billable"],[C.teal+"99","Non-Billable"],[C.violet+"99","Marketing"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:10,height:10,borderRadius:2,background:c}}/>
                    <span style={{fontSize:"0.6rem",color:C.muted}}>{l}</span>
                  </div>
                ))}
                <span style={{fontSize:"0.6rem",color:C.muted}}>— 16h 目標</span>
              </div>
        </Card>
      )}
      {upcoming.length>0&&(
        <Card>
          <Lbl>即將到期</Lbl>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
            {upcoming.map((j,i)=>{
              const days=daysUntil(j.deadline);
              const urg=days==null?C.muted:days<0?C.red:days<=3?C.amber:days<=7?C.accent:C.muted;
              const cc=CC[j.client_id]||CC.default;
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,0.02)"}}>
                  <div style={{width:3,height:28,borderRadius:2,background:cc,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:"0.8rem",color:C.text,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{j.project_name}</div>
                    <div style={{fontSize:"0.65rem",color:C.muted}}>{j.client_id} · {j.job_type}</div>
                  </div>
                  <Badge status={j.status}/>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:"0.78rem",fontFamily:"monospace",color:urg,fontWeight:600}}>{days==null?"—":days<0?`逾期${Math.abs(days)}日`:days===0?"今日":`${days}日後`}</div>
                    <div style={{fontSize:"0.62rem",color:C.dim}}>{j.deadline}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

/* ── PROJECTS VIEW ───────────────────────── */
function ProjectsView({data}){
  const{jobs=[]}=data;
  const active=jobs.filter(j=>["Footage In","Editing","First Cut Sent","Revisions"].includes(j.status));
  const COLS=[
    {id:"Footage In", label:"Footage In",      note:"素材到手，未開剪"},
    {id:"Editing",          label:"Editing",         note:"剪緊"},
    {id:"First Cut Sent",   label:"First Cut Sent",  note:"初剪出咗，等尾款"},
    {id:"Revisions",        label:"Revisions",       note:"收尾款，做修改"},
  ];
  const cols=COLS;
  return(
    <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8}}>
      {cols.map(({id,label,note})=>{
        const col=id;
        const cj=active.filter(j=>j.status===col);
        const color=SC[col]||C.muted;
        return(
          <div key={col} style={{flex:"0 0 215px",display:"flex",flexDirection:"column",gap:8}}>
            <div style={{paddingBottom:8,borderBottom:`1px solid ${color}40`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:color}}/>
                <span style={{fontSize:"0.64rem",fontFamily:"monospace",color,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span>
                <span style={{fontSize:"0.6rem",color:C.dim,marginLeft:"auto"}}>{cj.length}</span>
              </div>
              <div style={{fontSize:"0.6rem",color:C.dim,paddingLeft:15}}>{note}</div>
            </div>
            {cj.length===0&&<div style={{fontSize:"0.7rem",color:C.dim,padding:"12px 0",textAlign:"center"}}>—</div>}
            {cj.map((j,i)=>{
              const cc=CC[j.client_id]||CC.default;
              const actual=+(j["actual_hours"]||0);
              const est=+(j["est_hours"]||0);
              const p=est>0?Math.min(actual/est,1):0;
              return(
                <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontSize:"0.77rem",color:C.text,fontWeight:500,lineHeight:1.3,marginBottom:6}}>{j.project_name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:est>0?8:0}}>
                    <div style={{width:5,height:5,borderRadius:"50%",background:cc}}/>
                    <span style={{fontSize:"0.62rem",color:C.muted}}>{j.client_id}</span>
                  </div>
                  {est>0&&(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:"0.58rem",color:C.dim}}>工時</span>
                        <span style={{fontSize:"0.58rem",color:C.muted,fontFamily:"monospace"}}>{actual.toFixed(1)}/{est}h</span>
                      </div>
                      <div style={{height:3,background:"rgba(255,255,255,0.08)",borderRadius:2}}>
                        <div style={{height:"100%",width:`${p*100}%`,background:color,borderRadius:2}}/>
                      </div>
                    </div>
                  )}
                  {j.deadline&&<div style={{marginTop:8,fontSize:"0.6rem",color:C.dim,fontFamily:"monospace"}}>⛳ {j.deadline}</div>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ── GANTT VIEW ───────────────────────── */
function GanttView({data}){
  const{jobs=[],capacity={}}=data;
  const today=new Date();today.setHours(0,0,0,0);
  const[zoom,setZoom]=useState(60);

  const active=jobs
    .filter(j=>!["Closed","Delivered"].includes(j.status)&&j.start_date&&j.deadline)
    .sort((a,b)=>parseD(a.start_date)-parseD(b.start_date));

  if(!active.length)return(
    <Card><div style={{color:C.muted,textAlign:"center",padding:40,fontFamily:"monospace",fontSize:"0.8rem"}}>冇進行中嘅 Jobs 有 start_date + deadline</div></Card>
  );

  const ZCFG={14:{before:3,after:11,label:"2週"},60:{before:7,after:53,label:"2月"},90:{before:7,after:83,label:"3月"}};
  const cfg=ZCFG[zoom];
  const rStart=new Date(today);
  rStart.setDate(rStart.getDate()-cfg.before);
  const dow=rStart.getDay();
  rStart.setDate(rStart.getDate()+(dow===0?-6:1-dow));
  const rEnd=new Date(today);
  rEnd.setDate(rEnd.getDate()+cfg.after);
  const totalMs=rEnd-rStart;
  const pct=d=>Math.max(0,Math.min(100,((parseD(d)-rStart)/totalMs)*100));
  const todayPct=pct(today);

  const weeks=[];
  const wc=new Date(rStart);
  while(wc<=rEnd){
    weeks.push({date:new Date(wc),pct:pct(wc),label:`${wc.getMonth()+1}/${wc.getDate()}`});
    wc.setDate(wc.getDate()+7);
  }

  const WEEKLY_TARGET=25;
  const workload=weeks.map(w=>{
    const wS=w.date,wE=new Date(wS);wE.setDate(wE.getDate()+7);
    let committed=0;
    active.forEach(j=>{
      const jS=parseD(j.start_date),jE=parseD(j.deadline);
      if(jS>=wE||jE<=wS)return;
      const remaining=Math.max((+(j.est_hours||0))-(+(j["actual_hours"]||0)),0);
      const remDays=Math.max((jE-Math.max(today,jS))/86400000,1);
      const ovS=Math.max(+wS,+jS),ovE=Math.min(+wE,+jE);
      const ovDays=Math.max((ovE-ovS)/86400000,0);
      committed+=remaining*(ovDays/remDays);
    });
    return{...w,committed};
  });
  const maxC=Math.max(...workload.map(w=>w.committed),WEEKLY_TARGET,1);

  const ROW=44,LW=170,WH=70;

  return(
    <Card style={{padding:"16px 0",overflow:"hidden"}}>
      <div style={{padding:"0 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Lbl>甘特圖 — 進行中 Jobs</Lbl>
        <div style={{display:"flex",gap:4}}>
          {[14,60,90].map(z=>(
            <button key={z} onClick={()=>setZoom(z)} style={{padding:"3px 10px",fontSize:"0.65rem",fontFamily:"monospace",borderRadius:5,cursor:"pointer",background:zoom===z?"rgba(232,168,56,0.15)":"rgba(255,255,255,0.04)",border:zoom===z?"1px solid rgba(232,168,56,0.4)":`1px solid ${C.border}`,color:zoom===z?C.accent:C.muted}}>
              {ZCFG[z].label}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"flex"}}>
        <div style={{width:LW,flexShrink:0,paddingLeft:20}}>
          <div style={{height:28}}/>
          <div style={{height:WH,display:"flex",alignItems:"center"}}>
            <span style={{fontSize:"0.58rem",color:C.muted,fontFamily:"monospace"}}>週工時負荷</span>
          </div>
          {active.map((j,i)=>{
            const cc=CC[j.client_id]||CC.default;
            return(
              <div key={i} style={{height:ROW,display:"flex",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
                <div style={{width:3,height:22,borderRadius:2,background:cc,marginRight:8,flexShrink:0}}/>
                <div style={{overflow:"hidden",width:LW-24}}>
                  <div style={{fontSize:"0.72rem",color:C.text,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{j.project_name}</div>
                  <div style={{fontSize:"0.6rem",color:C.muted}}>{j.client_id} · {j.status}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{flex:1,overflowX:"auto",position:"relative",minWidth:0,paddingRight:16}}>

          {/* 日期標籤 */}
          <div style={{height:28,position:"relative",borderBottom:`1px solid ${C.border}`}}>
            {weeks.map((w,i)=>(
              <span key={i} style={{position:"absolute",left:`${w.pct}%`,fontSize:"0.58rem",color:C.muted,fontFamily:"monospace",transform:"translateX(-50%)",top:6,whiteSpace:"nowrap"}}>{w.label}</span>
            ))}
          </div>

          {/* 工作量密度行 */}
          <div style={{height:WH,position:"relative",borderBottom:`1px solid ${C.border}`}}>
            {workload.map((w,i)=>{
              const next=workload[i+1];
              const bw=next?next.pct-w.pct:100-w.pct;
              const bh=Math.min(w.committed/maxC,1)*(WH-10);
              const over=w.committed>WEEKLY_TARGET;
              const bc=over?C.red:w.committed>WEEKLY_TARGET*0.7?C.amber:C.teal;
              return(
                <div key={i}>
                  <div style={{position:"absolute",left:`${w.pct}%`,width:`${Math.max(bw-0.3,0)}%`,bottom:4,height:`${Math.max(bh,2)}px`,background:`${bc}55`,border:`1px solid ${bc}35`,borderRadius:"2px 2px 0 0"}}/>
                  {w.committed>1&&bw>4&&<div style={{position:"absolute",left:`${w.pct+0.5}%`,bottom:6,fontSize:"0.52rem",color:over?C.red:C.muted,fontFamily:"monospace"}}>{w.committed.toFixed(0)}h</div>}
                </div>
              );
            })}
            {/* 目標線 */}
            <div style={{position:"absolute",left:0,right:0,bottom:`${(WEEKLY_TARGET/maxC)*(WH-10)+4}px`,borderTop:`1px dashed ${C.accent}50`,zIndex:2,pointerEvents:"none"}}/>
          </div>

          {/* Job 橫條區 */}
          <div style={{position:"relative"}}>
            {/* 週格線 + 本週高亮 */}
            {weeks.map((w,i)=>{
              const next=weeks[i+1];
              const isCurrent=w.date<=today&&(!next||next.date>today);
              const bw=next?next.pct-w.pct:100-w.pct;
              return(
                <div key={i}>
                  {isCurrent&&<div style={{position:"absolute",top:0,bottom:0,left:`${w.pct}%`,width:`${bw}%`,background:"rgba(232,168,56,0.06)",zIndex:0}}/>}
                  <div style={{position:"absolute",top:0,bottom:0,left:`${w.pct}%`,width:1,background:isCurrent?"rgba(232,168,56,0.2)":"rgba(255,255,255,0.05)",zIndex:1}}/>
                </div>
              );
            })}
            {/* 今日線 */}
            {todayPct>=0&&todayPct<=100&&(
              <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:1,background:C.red,opacity:0.9,zIndex:6}}/>
            )}
            {/* Job 橫條 */}
            {active.map((j,i)=>{
              const cc=CC[j.client_id]||CC.default;
              const l=pct(j.start_date),r=pct(j.deadline),w=Math.max(r-l,0.5);
              const actual=+(j["actual_hours"]||0),est=+(j["est_hours"]||0);
              const prog=est>0?Math.min(actual/est,1):0;
              return(
                <div key={i} style={{height:ROW,position:"relative",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{position:"absolute",left:`${l}%`,width:`${w}%`,height:24,top:"50%",transform:"translateY(-50%)",background:`${cc}20`,border:`1px solid ${cc}45`,borderRadius:5,overflow:"hidden",minWidth:4,zIndex:2}}>
                    {prog>0&&<div style={{position:"absolute",inset:0,width:`${prog*100}%`,background:`${cc}55`,borderRadius:5}}/>}
                    {w>7&&prog>0&&<div style={{position:"absolute",left:5,top:"50%",transform:"translateY(-50%)",fontSize:"0.55rem",fontFamily:"monospace",color:cc}}>{Math.round(prog*100)}%</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{padding:"10px 20px 0",display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
        {[
          [()=><div style={{width:1,height:12,background:C.red,opacity:0.9}}/>,"今日"],
          [()=><div style={{width:14,height:8,background:"rgba(232,168,56,0.15)",border:"1px solid rgba(232,168,56,0.3)",borderRadius:2}}/>,"本週"],
          [()=><div style={{width:16,height:7,borderRadius:3,background:"rgba(232,168,56,0.5)"}}/>,"完成度"],
          [()=><div style={{width:14,height:8,borderRadius:"2px 2px 0 0",background:"rgba(126,184,164,0.5)"}}/>,"週負荷"],
        ].map(([Icon,label],i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
            <Icon/><span style={{fontSize:"0.6rem",color:C.muted}}>{label}</span>
          </div>
        ))}
        <span style={{fontSize:"0.6rem",color:C.muted}}>虛線=25h目標</span>
      </div>
    </Card>
  );
}

/* ── CAPACITY VIEW ───────────────────────── */
  
function CapacityView({data}){
  const{capacity={}}=data;
  const weekly=(capacity.weekly||[]).slice().reverse();
  const recent=weekly.slice(-8).reverse();
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card>
        <Lbl>每週工時歷史（最近 12 週）</Lbl>
        <div style={{marginTop:10}}>
          <BarChart
            data={weekly.map(w=>({...w,_onb:Math.max((+(w.non_billable||0))-(+(w.marketing_hours||0)),0)}))}
            segments={[{key:"billable_hours",color:C.accent},{key:"_onb",color:C.teal+"99"},{key:"marketing_hours",color:C.violet+"99"}]}
            labelKey="week_start" refLine={25} height={180}
          />
        </div>
        <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
          {[[C.accent,"Billable"],[C.teal+"99","Non-Billable"],[C.violet+"99","Marketing"]].map(([c,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:10,height:10,borderRadius:2,background:c}}/>
              <span style={{fontSize:"0.6rem",color:C.muted}}>{l}</span>
            </div>
          ))}
          <span style={{fontSize:"0.6rem",color:C.muted}}>— 25h 目標</span>
        </div>
      </Card>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {recent.map((w,i)=>(
          <Card key={i} style={{flex:1,minWidth:130}}>
            <div style={{fontSize:"0.62rem",color:C.muted,fontFamily:"monospace",marginBottom:4}}>{w.week_start?String(w.week_start).slice(5):"—"}</div>
            <div style={{fontSize:"1.5rem",fontFamily:"'Fraunces',serif",color:C.accent}}>{(+(w.billable_hours||0)).toFixed(1)}h</div>
            <div style={{fontSize:"0.65rem",color:C.muted,marginBottom:8}}>{w.status||"—"}</div>
            <div style={{height:3,background:"rgba(255,255,255,0.08)",borderRadius:2}}>
              <div style={{height:"100%",width:`${Math.min((+(w.billable_hours||0))/25,1)*100}%`,background:C.accent,borderRadius:2}}/>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ── MAIN APP ────────────────────────────── */
const KEY="loki_gas_url";
const NAV=[
  {id:"dashboard",label:"總覽",  icon:"◈"},
  {id:"projects", label:"專案",  icon:"▦"},
  {id:"capacity", label:"容量",  icon:"⏱"},
  {id:"gantt",    label:"甘特圖",icon:"▤"},
  {id:"finance",  label:"財務",  icon:"◎",soon:true},
];

function App(){
  const[isDark,setIsDark]=useState(()=>{const t=localStorage.getItem('loki_theme')||'dark';applyTheme(t);return t==='dark';});
  const toggleTheme=()=>{const n=!isDark;applyTheme(n?'dark':'light');localStorage.setItem('loki_theme',n?'dark':'light');setIsDark(n);};
  const[data,setData]        =useState(null);
  const[loading,setLoading]  =useState(false);
  const[error,setError]      =useState(null);
  const[tab,setTab]          =useState("dashboard");
  const[lastFetch,setLast]   =useState(null);

  const fetchData=useCallback(async url=>{
    if(!url)return;
    setLoading(true);setError(null);
    try{
      const r=await fetch(url,{redirect:"follow"});
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const j=await r.json();
      if(j.error)throw new Error(j.error);
      setData(j);setLast(new Date());
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{if(gasUrl)fetchData(gasUrl);},[gasUrl]);

  const save=url=>{localStorage.setItem(KEY,url);setGasUrl(url);};
  const disc=()=>{localStorage.removeItem(KEY);setGasUrl(null);setData(null);};

  if(!gasUrl)return<SetupScreen onSave={save}/>;

  return(
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{padding:"20px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:"0.57rem",fontFamily:"monospace",color:C.muted,letterSpacing:"0.2em",marginBottom:4}}>FREELANCE OS</div>
          <div style={{fontSize:"1.5rem",fontFamily:"'Fraunces',serif",fontStyle:"italic",letterSpacing:"-0.02em"}}>
            Loki Creatives <span style={{color:C.accent}}>Studio</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {lastFetch&&<div style={{fontSize:"0.62rem",color:C.dim,fontFamily:"monospace"}}>{lastFetch.toLocaleTimeString("en-HK",{hour:"2-digit",minute:"2-digit"})}</div>}
          <button onClick={()=>fetchData(gasUrl)} disabled={loading}
            style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,color:loading?C.dim:C.teal,borderRadius:6,padding:"4px 10px",fontSize:"0.7rem",fontFamily:"monospace"}}>
            {loading?"...":"↻ 刷新"}
          </button>
          <button onClick={toggleTheme} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,padding:"4px 10px",fontSize:"0.8rem"}} title={isDark?"切換淺色模式":"切換深色模式"}>
            {isDark?"☀️":"🌙"}
          </button>
        </div>
      </div>
      {/* Nav */}
      <div style={{display:"flex",gap:4,padding:"16px 28px 0",borderBottom:`1px solid ${C.border}`,marginTop:16}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>!n.soon&&setTab(n.id)}
            style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",borderRadius:"8px 8px 0 0",background:tab===n.id?"rgba(232,168,56,0.1)":"transparent",border:tab===n.id?"1px solid rgba(232,168,56,0.2)":"1px solid transparent",borderBottom:tab===n.id?"1px solid #0B0E14":"1px solid transparent",color:tab===n.id?C.accent:n.soon?C.dim:C.muted,fontSize:"0.72rem",fontFamily:"monospace",opacity:n.soon?0.4:1}}>
            <span style={{fontSize:"0.67rem"}}>{n.icon}</span>{n.label}
            {n.soon&&<span style={{fontSize:"0.5rem",color:C.dim}}>soon</span>}
          </button>
        ))}
      </div>
      {/* Content */}
      <div style={{padding:"20px 28px"}}>
        {error&&(
          <div style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:"0.77rem",color:C.red,display:"flex",gap:12,alignItems:"center"}}>
            <span>⚠️ {error}</span>
            <button onClick={()=>fetchData(gasUrl)} style={{color:C.red,background:"none",border:"none",textDecoration:"underline",fontSize:"0.77rem"}}>重試</button>
          </div>
        )}
        {loading&&!data&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,gap:12,opacity:0.4}}>
            <div style={{fontSize:"2rem"}}>⟳</div>
            <div style={{fontSize:"0.78rem",color:C.muted,fontFamily:"monospace"}}>正在讀取 Sheet 數據...</div>
          </div>
        )}
        {data&&tab==="dashboard"&&<DashboardView data={data}/>}
        {data&&tab==="projects" &&<ProjectsView data={data}/>}
        {data&&tab==="capacity" &&<CapacityView data={data}/>}
        {data&&tab==="gantt"&&<GanttView data={data}/>}
        {tab==="finance"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:280,gap:10,opacity:0.45}}>
            <div style={{fontSize:"2.5rem"}}>{tab==="gantt"?"📅":"💰"}</div>
            <div style={{fontSize:"0.78rem",color:C.muted,fontFamily:"monospace"}}>COMING SOON</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
